name: newsly
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.2.0
  cupertino_icons: ^1.0.9
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  equatable: ^2.0.8
  firebase_auth: ^6.3.0
  firebase_analytics: ^12.2.0
  firebase_remote_config: ^6.3.0
  google_sign_in: ^6.2.2
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1
  get_it: ^9.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  ionicons: ^0.2.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4


flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Muli
      fonts:
        - asset: assets/fonts/muli/Muli.ttf
        - asset: assets/fonts/muli/Muli-Bold.ttf
          weight: 700
        - asset: assets/fonts/muli/Muli-Light.ttf
          weight: 300

flutter_launcher_icons:
  android: "launcher_icon"
  adaptive_icon_background: "#E94560"
  ios: true
  image_path: "assets/app/icon.png"
  adaptive_icon_foreground: "assets/app/adaptive_icon.png"
  adaptive_icon_monochrome: "assets/app/adaptive_icon.png"
  adaptive_icon_foreground_inset: 22
  min_sdk_android: 21

flutter_native_splash:
  image: assets/app/splash.png
  color: "#E94560"

  android_12:
    image: assets/app/splash.png
    color: "#E94560"